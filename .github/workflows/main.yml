name: Build SDS Portal EXE

# This lets you trigger the build manually with a button click
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest # Tells GitHub to use a Windows PC to make a Windows .exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build the EXE
      run: |
        pyinstaller --onefile --noconsole --add-data "app.py;." --add-data "logo.png;." --copy-metadata streamlit run_app.py

    - name: Upload the final EXE for you to download
      uses: actions/upload-artifact@v4
      with:
        name: SDS_Portal_App
        path: dist/run_app.exe
